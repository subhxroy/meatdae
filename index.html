<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeatDae Portal Dashboard</title>
    <meta name="breachme-verify" content="breachme-verify=d4a86ad3ac627e9d2cc8f3e975a16c3f" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff7c08;
            --primary-dark: #e66d00;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 40px;
            color: var(--text);
        }
        h1 span {
            color: var(--primary);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 900px;
            width: 100%;
        }
        .portal-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }
        .portal-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(255, 124, 8, 0.1);
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        h2 {
            margin: 0 0 10px;
            font-weight: 700;
            font-size: 1.5rem;
        }
        p {
            color: #64748b;
            margin: 0;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            background: var(--primary);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .portal-card:hover .btn {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <h1>Meat<span>Dae</span> Portal</h1>
    <div class="container">
        <a href="customer/" class="portal-card">
            <div class="icon">🛒</div>
            <h2>Customer Portal</h2>
            <p>Shop for fresh meat and track your orders.</p>
            <div class="btn">Launch Shop</div>
        </a>
        <a href="staff/" class="portal-card">
            <div class="icon">👔</div>
            <h2>Staff Portal</h2>
            <p>Admin, Rider, and Kitchen dashboards.</p>
            <div class="btn">Staff Login</div>
        </a>
    </div>
</body>
</html>
