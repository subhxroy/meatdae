  <style>
    body {
      font-family: 'Outfit', sans-serif !important;
      background: #fdfdfd;
    }

    .header-logo-img img,
    .sidebar-logo {
      height: 22px !important;
      /* Increased for professionalism */
      width: auto !important;
      object-fit: contain !important;
    }

    .contact_wrapper {
      padding-top: 20px;
      padding-bottom: 80px;
    }

    .premium_form_card {
      background: #fff;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
      border: 1px solid #f2f2f2;
    }

    .form_title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #1a1a1a;
    }

    .form_title i {
      color: #ff7c08;
      font-size: 20px;
    }

    .premium_input_group {
      margin-bottom: 20px;
      position: relative;
    }

    .premium_input_group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #666;
      margin-bottom: 8px;
      margin-left: 5px;
    }

    .premium_input_group .input_wrapper {
      background: #f8f9fa;
      border: 1px solid #eee;
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 5px 15px;
      transition: all 0.3s;
    }

    .premium_input_group .input_wrapper:focus-within {
      background: #fff;
      border-color: #ff7c08;
      box-shadow: 0 0 0 4px rgba(255, 124, 8, 0.05);
    }

    .premium_input_group .input_wrapper i {
      color: #999;
      font-size: 16px;
      margin-right: 12px;
    }

    .premium_input_group .input_wrapper input,
    .premium_input_group .input_wrapper textarea {
      background: transparent;
      border: none;
      width: 100%;
      padding: 10px 0;
      font-size: 15px;
      color: #333;
      outline: none;
      font-family: 'Outfit', sans-serif;
    }

    .submit_wrapper {
      margin-top: 30px;
    }

    .btn_premium_send {
      background: #ff7c08;
      color: #fff;
      border: none;
      padding: 15px 40px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 16px;
      width: 100%;
      box-shadow: 0 8px 25px rgba(255, 124, 8, 0.25);
      transition: all 0.3s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn_premium_send:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(255, 124, 8, 0.35);
      background: #e66b00;
    }

    .map_card {
      margin-top: 40px;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid #f2f2f2;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
    }

<body>
  <!-- Dynamic Layout Components -->
  <div id="sidebar-placeholder"></div>
  <div id="header-placeholder"></div>



  <!-- Page Skeleton -->
  <div id="page-skeleton" class="skeleton-page">
    <div class="skeleton-header skeleton"></div>
    <div class="skeleton-content-block skeleton" style="height: 100px;"></div>
    <div class="skeleton-content-block skeleton" style="height: 300px;"></div>
  </div>

  <div id="actual-page" style="display: none; opacity: 0; transition: opacity 0.6s ease;">
    <section class="contact_section">
    <div class="container">
      <div class="contact_title_area">
        <h1>Contact Us</h1>
        <p>Expert support is just a message away. Reach out to the MeatDae team for any questions or feedback.</p>
      </div>

      <div class="contact_info_grid">
        <div class="premium_info_card">
          <div class="card_icon_box"><i class="fas fa-phone-alt"></i></div>
          <h3>Call Support</h3>
          <p>Available 8:00 AM - 8:00 PM</p>
          <a href="tel:+917002568330">+91 70025 68330</a>
        </div>
        <div class="premium_info_card">
          <div class="card_icon_box"><i class="fas fa-envelope"></i></div>
          <h3>Email Us</h3>
          <p>For general inquiries</p>
          <a href="mailto:contact.meatdae@gmail.com">contact.meatdae@gmail.com</a>
        </div>
        <div class="premium_info_card">
          <div class="card_icon_box"><i class="fas fa-location-dot"></i></div>
          <h3>Location</h3>
          <p>New Market</p>
          <p>Silchar, Assam - 788001</p>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="premium_form_card">
            <h2 class="form_title"><i class="fas fa-paper-plane"></i> Send a Message</h2>
            <form class="contact_form" id="contact_form"
              data-script-url="https://script.google.com/macros/s/AKfycbyPAtdjYsF5k4q6hDndBSqKeEyKmkkbr1p2Dir6UsGMZKQJyevtoM0K27CwzJhP7g0Vkg/exec">
              <div class="row">
                <div class="col-md-6">
                  <div class="premium_input_group">
                    <label>Your Name</label>
                    <div class="input_wrapper">
                      <i class="far fa-user"></i>
                      <input type="text" name="name" placeholder="John Doe" required />
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="premium_input_group">
                    <label>Email Address</label>
                    <div class="input_wrapper">
                      <i class="far fa-envelope"></i>
                      <input type="email" name="email" placeholder="john@example.com" required />
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="premium_input_group">
                    <label>Phone Number (Optional)</label>
                    <div class="input_wrapper">
                      <i class="fas fa-mobile-screen"></i>
                      <input type="text" name="phone" placeholder="+91 00000 00000" />
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="premium_input_group">
                    <label>How can we help?</label>
                    <div class="input_wrapper">
                      <i class="far fa-comment-dots" style="margin-top: 10px; align-self: flex-start;"></i>
                      <textarea rows="4" name="message" placeholder="Describe your inquiry..." required></textarea>
                    </div>
                  </div>
                </div>
                <div class="col-12 submit_wrapper">
                  <button type="submit" class="btn_premium_send">
                    <span>Send Message</span>
                    <i class="fas fa-arrow-right"></i>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="map_card wow fadeInUp">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3607.525287955562!2d92.78495131501103!3d24.81231698401138!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x374e4a66a33a1e1d%3A0x3a657c2f0e1d0c5c!2sRangirkhari%2C%20Silchar%2C%20Assam%20788005!5e0!3m2!1sen!2sin!4v1667825318880!5m2!1sen!2sin"
          width="100%" height="320" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>
  </section>
