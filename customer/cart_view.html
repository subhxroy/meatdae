  <style>
    /* Logo fix */
    .header-logo-img img, .sidebar-logo {
      display: block;
      width: auto !important;
      height: 22px !important;
      /* Increased for professionalism */

  <style>
    /* ── Skeleton loading cards ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton-line {
      border-radius: 6px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .cart-skeleton-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #f0f0f0;
    }
    .cart-skeleton-img  { width: 72px; height: 72px; border-radius: 10px; flex-shrink: 0; }
    .cart-skeleton-body { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .cart-skeleton-title{ height: 14px; width: 65%; }
    .cart-skeleton-sub  { height: 11px; width: 40%; }
    .cart-skeleton-price{ height: 16px; width: 30%; }
    .cart-skeleton-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .cart-skeleton-qty  { height: 30px; width: 90px; border-radius: 8px; }
    .cart-skeleton-trash{ height: 30px; width: 30px; border-radius: 8px; }
  </style>

  <!-- Dynamic Layout Components -->
  <div id="sidebar-placeholder"></div>

  <main class="wow fadeInUp" data-wow-duration="1s">
    <div class="cart-title-area">
      <h2>My Cart <span id="myntra-cart-count">(0 items)</span></h2>
    </div>

    <!-- Free Delivery Promotion Banner (Compact centered design) -->
    <div id="free-delivery-banner" class="delivery-promo-banner" style="margin: 0 auto 15px; width: 300px; padding: 10px 15px; background: #fff8f4; border-radius: 12px; display: none; flex-direction: column; gap: 6px; box-shadow: 0 4px 12px rgba(255, 124, 8, 0.08); border: 1px solid #fff3e8;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <i id="free-delivery-icon" class="fas fa-truck-fast" style="color: #ff7c08; font-size: 16px;"></i>
        <span id="free-delivery-text" style="font-size: 10px; font-weight: 600; color: #333; white-space: nowrap;">Enjoy <span style="color: #ff7c08;">FREE DELIVERY</span> on orders of ₹350 or above!</span>
      </div>
      <div class="free-delivery-progress-container" style="width: 100%; height: 6px; background: #f0e0d6; border-radius: 10px; overflow: hidden; margin-top: 4px;">
        <div id="free-delivery-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff7c08, #ff9f43); transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
      </div>
    </div>

    <!-- Free Delivery Progress Card Removed -->

    <!-- Cart Items Container -->
    <div id="myntra-cart-items" class="cart-items-container">
      <!-- Skeleton shown while Firebase loads, hidden by JS -->
      <div id="cart-skeleton-loader">
        <div class="cart-skeleton-card">
          <div class="skeleton-line cart-skeleton-img"></div>
          <div class="cart-skeleton-body">
            <div class="skeleton-line cart-skeleton-title"></div>
            <div class="skeleton-line cart-skeleton-sub"></div>
            <div class="skeleton-line cart-skeleton-price"></div>
            <div class="cart-skeleton-actions">
              <div class="skeleton-line cart-skeleton-qty"></div>
              <div class="skeleton-line cart-skeleton-trash"></div>
            </div>
          </div>
        </div>
        <div class="cart-skeleton-card">
          <div class="skeleton-line cart-skeleton-img"></div>
          <div class="cart-skeleton-body">
            <div class="skeleton-line cart-skeleton-title"></div>
            <div class="skeleton-line cart-skeleton-sub"></div>
            <div class="skeleton-line cart-skeleton-price"></div>
            <div class="cart-skeleton-actions">
              <div class="skeleton-line cart-skeleton-qty"></div>
              <div class="skeleton-line cart-skeleton-trash"></div>
            </div>
          </div>
        </div>
        <div class="cart-skeleton-card">
          <div class="skeleton-line cart-skeleton-img"></div>
          <div class="cart-skeleton-body">
            <div class="skeleton-line cart-skeleton-title"></div>
            <div class="skeleton-line cart-skeleton-sub"></div>
            <div class="skeleton-line cart-skeleton-price"></div>
            <div class="cart-skeleton-actions">
              <div class="skeleton-line cart-skeleton-qty"></div>
              <div class="skeleton-line cart-skeleton-trash"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recommendations Section -->
    <section id="push-sale-section" class="addons-section" style="display: none;">
      <div class="addons-header">
        <h3>You Might Also Like</h3>
        <a href="menu.html" class="view-all">View all</a>
      </div>
      <div class="addons-scroll">
        <div class="addon-card">
          <div class="addon-img"><img src="images/items/fresh big eggs1.webp" alt="Big Eggs"></div>
          <div class="addon-info">
            <h5>Pack of 10 Fresh Big Eggs</h5>
            <p>10 pieces</p>
          </div>
          <div class="addon-footer">
            <span class="addon-price" id="addon-price-big-eggs">₹67</span>
            <button class="addon-add-btn add-push-sale-item" data-id="big-eggs"><i class="fas fa-plus"></i></button>
          </div>
        </div>
 
        <div class="addon-card">
          <div class="addon-img"><img src="images/items/duck.png" alt="Duck Eggs"></div>
          <div class="addon-info">
            <h5>Pack of 10 Local Duck Eggs</h5>
            <p>10 pieces</p>
          </div>
          <div class="addon-footer">
            <span class="addon-price" id="addon-price-local-duck-eggs">₹134</span>
            <button class="addon-add-btn add-push-sale-item" data-id="local-duck-eggs"><i
                class="fas fa-plus"></i></button>
          </div>
        </div>
      </div>
    </section>
 
    <!-- Order Summary Card -->
    <div class="cart_list_footer_button">

        </div>
        <div class="summary-row">
          <span>Delivery Fee</span>

        </div>
        <div class="summary-row discount">
          <span>Discount <i class="fas fa-tag ms-1"></i></span>
          <span id="summary-discount">₹0.00</span>
        </div>
 
        <div class="summary-row total">
          <span>Total to pay</span>
          <span class="price" id="summary-total">₹0.00</span>
        </div>

        <a href="check_out.html" class="checkout-btn checkout_btn">
          PROCEED TO CHECKOUT <i class="fas fa-arrow-right"></i>
        </a>
      </div>
    </div>
