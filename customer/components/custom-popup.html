<!-- Global Custom Popup -->
<div id="custom-popup" class="popup-overlay">
  <div class="popup-box">
    <button class="popup-close-btn" id="popup-close" aria-label="Close">&times;</button>
    <div class="popup-icon">
      <i class="fas fa-check-circle success"></i>
    </div>
    <h4>Success!</h4>
    <p>Your message here.</p>
    <div class="popup-buttons">
      <button class="common_btn" id="popup-ok">OK</button>
      <button class="common_btn btn-secondary" id="popup-cancel" style="display: none;">Cancel</button>
    </div>
  </div>
</div>
