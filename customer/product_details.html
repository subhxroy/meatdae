<body>
  <!-- Global Components via layout-loader -->
  <div id="sidebar-placeholder"></div>
  <div id="header-placeholder"></div>

  <section class="menu_details mb_95 xs_mb_65" style="margin-top: 20px;">
    <div class="container">
      <div class="row">
        <!-- Gallery -->
        <div class="col-lg-5 col-sm-10 col-md-9 wow fadeInUp" data-wow-duration="1s">
          <div class="custom-image-gallery">
            <div class="main-image-container skeleton sk-img">
              <img id="main-product-image" src="" alt="product" style="display:none;">
            </div>
            <div class="thumbnail-container mt-3" id="pd-thumbnails">
              <div class="thumbnail-item skeleton" style="width:60px; height:60px;"></div>
              <div class="thumbnail-item skeleton" style="width:60px; height:60px;"></div>
              <div class="thumbnail-item skeleton" style="width:60px; height:60px;"></div>
            </div>
          </div>
        </div>

        <!-- Product Details -->
        <div class="col-lg-7 wow fadeInUp" data-wow-duration="1s">
          <div class="menu_details_text">
            <h2 id="pd-title" data-product-id="" class="skeleton sk-title"></h2>
            <h3 class="price"><span id="base-price" class="skeleton"></span><del id="del-price"></del><span id="low-stock-badge" class="badge bg-warning text-dark ms-2" style="display:none; font-size: 0.8rem; vertical-align: middle;"><i class="fas fa-bolt me-1"></i> Low Stock</span></h3>
            <p class="short_description" id="pd-short-desc">
              <span class="skeleton sk-text"></span>
              <span class="skeleton sk-text" style="width:90%"></span>
            </p>

            <div class="details_size" id="pd-variants-container" style="display:none;">
              <h5>select weight</h5>
              <div id="pd-variants">
                <!-- Dynamically populated from Firestore if applicable, or logic below -->
                <div class="spinner-border text-primary spinner-border-sm" role="status"></div> Loading sizes...
              </div>
            </div>

            <div class="details_quentity">
              <h5>select quantity</h5>
              <div class="quentity_btn_area d-flex flex-wrapa align-items-center">
                <div class="quentity_btn">
                  <button class="btn btn-danger minus-btn"><i class="fas fa-minus"></i></button>
                  <input type="text" value="1" readonly id="quantity-input" />
                  <button class="btn btn-success plus-btn"><i class="fas fa-plus"></i></button>
                </div>
                <h3 id="total-price">-</h3>
              </div>
            </div>
            <ul class="details_button_area d-flex flex-wrap">
              <li><a class="common_btn" href="#" id="pd-add-to-cart"><i class="fas fa-shopping-basket"></i> Add to Cart</a></li>
            </ul>
          </div>
        </div>

        <!-- Description Tab -->
        <div class="col-12 wow fadeInUp" data-wow-duration="1s">
          <div class="menu_description_area mt_30 xs_mt_30">
            <ul class="nav nav-pills" id="pills-tab" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pills-home-tab" data-bs-toggle="pill" data-bs-target="#pills-home"
                  type="button" role="tab" aria-controls="pills-home" aria-selected="true">
                  Description
                </button>
              </li>
            </ul>
            <div class="tab-content" id="pills-tabContent">
              <div class="tab-pane fade show active" id="pills-home" role="tabpanel" aria-labelledby="pills-home-tab"
                tabindex="0">
                <div class="menu_det_description">
                  <p id="pd-long-desc">Loading detailed description...</p>
                  <p id="pd-nutrition" style="margin-top:20px;"><b>Nutritional Value:-</b><br>...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer style="background: url(images/footer_bg.jpg)">
    <div class="footer_overlay pt_100 xs_pt_70 pb_100 xs_pb_20">

          <div class="col-xxl-4 col-lg-4 col-sm-9 col-md-7">

            </div>
          </div>
        </div>
