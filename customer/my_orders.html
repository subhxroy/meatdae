    <style>
        /* ======================================
           MY ORDERS PAGE - REDESIGNED UI
           ====================================== */
        
        .orders-page-wrapper {
            background: #f8f9fa;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Page Header */
        .orders-header {
            background: #fff;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .orders-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #333;
            font-size: 18px;
        }

        .back-btn:hover {
            background: #eee;
        }

        .orders-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0;
            font-family: 'Manrope', sans-serif;
        }

        .orders-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #333;
            font-size: 20px;
            transition: all 0.2s;
        }

        .header-icon-btn:hover {
            background: #f5f5f5;
        }

        /* Tab Navigation */
        .orders-tabs {
            background: #fff;
            padding: 0 20px;
            display: flex;
            gap: 32px;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            padding: 16px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #ff6b00;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: #ff6b00;
            border-radius: 3px 3px 0 0;
        }

        /* Orders Container */
        .orders-content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .orders-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-left: 4px;
        }

        /* Order Card - New Design */
        .order-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .order-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 4px 0;
        }

        .order-date {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }

        /* Status Badge - Redesigned */
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-PENDING_APPROVAL { 
            background: #fff3eb; 
            color: #ff7c08;
            border: 1px solid #ffe0cc;
        }
        .status-PREPARING { 
            background: #fff3eb; 
            color: #ff7c08;
            border: 1px solid #ffe0cc;
        }
        .status-OUT_FOR_DELIVERY { 
            background: #ff7c08; 
            color: #fff;
            border: 1px solid #ff7c08;
        }
        .status-DELIVERED { 
            background: #1a1a1a; 
            color: #fff;
            border: 1px solid #1a1a1a;
        }
        .status-CANCELLED { 
            background: #f5f5f5; 
            color: #888;
            border: 1px solid #ddd;
        }

        /* Product Row */
        .order-product {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
        }

        .order-product-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: #f8f8f8;
        }

        .order-product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .order-product-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 4px 0;
        }

        .order-product-qty {
            font-size: 13px;
            color: #888;
            margin-bottom: 4px;
        }

        .order-product-price {
            font-size: 16px;
            font-weight: 700;
            color: #ff6b00;
        }

        /* Status Timeline - Redesigned */
        .status-timeline {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 10px;
            margin: 16px 0;
            position: relative;
        }

        .status-timeline::before {
            content: '';
            position: absolute;
            top: 38px;
            left: 40px;
            right: 40px;
            height: 3px;
            background: #e0e0e0;
            z-index: 0;
        }

        .timeline-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .timeline-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .timeline-dot.active {
            background: #4caf50;
        }

        .timeline-dot.current {
            background: #ff6b00;
            animation: pulse 2s infinite;
        }

        .timeline-dot.cancelled {
            background: #f44336;
        }

        .timeline-dot.pending {
            background: #e0e0e0;
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.4); 
            }
            50% { 
                box-shadow: 0 0 0 12px rgba(255, 107, 0, 0); 
            }
        }

        .timeline-label {
            font-size: 11px;
            color: #888;
            font-weight: 600;
            text-align: center;
        }

        .timeline-label.active {
            color: #4caf50;
        }

        .timeline-label.current {
            color: #ff6b00;
        }

        .timeline-line {
            position: absolute;
            top: 38px;
            height: 3px;
            background: #4caf50;
            z-index: 0;
            left: 0;
        }

        /* Payment Info */
        .payment-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #f0f0f0;
            margin-top: 12px;
        }

        .payment-info i {
            color: #888;
            font-size: 16px;
        }

        /* Track Button - Full Width */
        .btn-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: #ff6b00;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-top: 16px;
        }

        .btn-track:hover {
            background: #e66000;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        .btn-track i {
            font-size: 18px;
        }

        /* Reorder Button */
        .btn-reorder {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            background: #ff6b00;
            color: white;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(255, 107, 0, 0.2);
        }

        .btn-reorder:hover {
            background: #e66000;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 107, 0, 0.3);
        }

        .btn-reorder i {
            transition: transform 0.3s ease;
        }

        .btn-reorder:hover i {
            transform: rotate(180deg);
        }

        /* History Card Styling */
        .order-card.history-card .order-product {
            margin-bottom: 0;
        }

        .order-card.history-card .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        /* Cancellation Alert */
        .cancellation-alert {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            border: 1px solid #ef9a9a;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .cancellation-alert i {
            color: #c62828;
            font-size: 20px;
            margin-top: 2px;
        }

        .cancellation-alert-text {
            flex: 1;
            font-size: 13px;
            color: #c62828;
            line-height: 1.5;
        }

        .cancellation-alert-text strong {
            display: block;
            margin-bottom: 4px;
        }

        .cancellation-alert-text a {
            color: #c62828;
            font-weight: 700;
            text-decoration: underline;
        }

        /* Empty State */
        .empty-orders {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: 16px;
        }

        .empty-orders i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
            display: block;
        }

        .empty-orders p {
            font-size: 16px;
            color: #888;
            margin-bottom: 20px;
        }

        .empty-orders .btn-shop {
            display: inline-block;
            padding: 12px 32px;
            background: #ff6b00;
            color: white;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .empty-orders .btn-shop:hover {
            background: #e66000;
            transform: translateY(-2px);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Additional Items */
        .more-items-link {
            font-size: 13px;
            color: #ff6b00;
            font-weight: 600;
            text-decoration: none;
            margin-top: 8px;
            display: inline-block;
        }

        .more-items-link:hover {
            text-decoration: underline;
        }

        /* Bottom Navigation - Redesigned */
        

        .bottom-nav-item {
            color: #888;
        }

        .bottom-nav-item.active {
            color: #ff6b00;
        }

        .bottom-nav-item .badge {
            background: #1a1a1a;
        }

        /* Loading State */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner i {
            font-size: 40px;
            color: #ff6b00;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Hide original header and breadcrumb */
        .premium-header,
        .page_breadcrumb {
            display: none !important;
        }

        /* Footer adjustments */
        footer {
            display: none;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .orders-content {
                padding: 16px;
            }

            .order-card {
                padding: 16px;
            }

            .order-product-img {
                width: 60px;
                height: 60px;
            }

            .timeline-dot {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }

            .timeline-label {
                font-size: 10px;
            }

            .status-timeline::before {
                left: 30px;
                right: 30px;
                top: 34px;
            }
        }

        .skeleton-card {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #f0f0f0;
        }
        .skeleton-card .sk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .skeleton-card .sk-tag  { height: 22px; width: 110px; border-radius: 20px; }
        .skeleton-card .sk-date { height: 12px; width: 80px; }
        .skeleton-card .sk-row  { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .skeleton-card .sk-img-box  { width: 50px; height: 50px; border-radius: 8px; flex-shrink: 0; }
        .skeleton-card .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .skeleton-card .sk-t1   { height: 13px; width: 70%; }
        .skeleton-card .sk-t2   { height: 11px; width: 40%; }
        .skeleton-card .sk-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #f5f5f5;
        }
        .skeleton-card .sk-price { height: 18px; width: 70px; }
        .skeleton-card .sk-btn-box   { height: 34px; width: 110px; border-radius: 8px; }
    </style>
</head>

    <!-- Tab Switching Logic -->
    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove active from all tabs
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active to clicked tab
                this.classList.add('active');
                const tabId = this.dataset.tab;
                document.getElementById(tabId + '-orders').classList.add('active');
            });
        });
    </script>
