<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login - MeatDae</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  
  <style>
    :root {
      --primary: #ff7c08;
    }
    body {
      background: linear-gradient(135deg, #f4f6f8 0%, #e9ecef 100%);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      width: 120px;
      margin-bottom: 20px;
    }
    .login-title {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 5px;
      color: #333;
    }
    .login-subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-control {
      background: #f8f9fa;
      border: 1px solid #eee;
      padding: 12px 20px;
      border-radius: 30px;
      margin-bottom: 15px;
    }
    .form-control:focus {
      background: white;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255,124,8,0.1);
    }
    .btn-login {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-weight: 700;
      width: 100%;
      margin-top: 10px;
      transition: all 0.3s;
    }
    .btn-login:hover {
      background: #e06500;
      transform: translateY(-2px);
    }
    .or-divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #999;
      font-size: 14px;
    }
    .or-divider::before, .or-divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #ddd;
    }
    .or-divider span {
      padding: 0 10px;
    }
    .btn-google {
      background: white;
      color: #333;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 30px;
      font-weight: 600;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }
    .btn-google:hover {
      background: #f8f9fa;
      border-color: #ccc;
    }
    .btn-google img {
      width: 20px;
      height: 20px;
    }
    
    /* Auth Loading Overlay */
    #auth-loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #666;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
  <body data-requires-auth="false">

  <div id="auth-loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Verifying Access...</div>
  </div>

  <div class="login-wrapper" style="display: none;">
    <img src="images/logo.png" alt="MeatDae" class="login-logo">
    <h2 class="login-title">Staff Portal</h2>
    <p class="login-subtitle">Sign in to access admin and rider tools</p>
    
    <div>
      <input type="email" id="email" class="form-control" placeholder="Email Address" required />
      <input type="password" id="password" class="form-control" placeholder="Password" required />
      <button type="button" id="signInBtn" class="btn-login">Sign In</button>
      
      <div class="or-divider"><span>or</span></div>
      
      <button type="button" id="googleSignInBtn" class="btn-google">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
  <!-- Load auth logic which redirects to index.html on success -->
  <script type="module" src="js/firebase-auth.js"></script>
  
  <script>
    // Mock the global alert functions used by firebase-auth.js to prevent UI errors
    window.showCustomPopup = function(msg) {
        alert(msg);
    };
  </script>
</body>
</html>
