    <style>
        :root {
            --primary: #ff7c08;
            --dark: #101010;
        }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .portal-logo {
            width: 150px;
            margin-bottom: 30px;
        }
        .portal-title {
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .portal-subtitle {
            color: #ccc;
            margin-bottom: 40px;
        }
        .btn-portal {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-portal:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 124, 8, 0.3);
        }
        .btn-portal i {
            font-size: 20px;
        }
    </style>

<body data-requires-auth="true">
    <div class="portal-card">
        <img src="images/logo.png" alt="MeatDae" class="portal-logo py-4" style="background-color: white; border-radius: 15px; padding: 10px;">
        <h1 class="portal-title">Staff Portal</h1>
        <p class="portal-subtitle">Access your designated dashboard below</p>
        
        <a href="preparer.html" class="btn-portal">

        </a>
        <a href="rider.html" class="btn-portal">
            <i class="fas fa-motorcycle"></i> Rider Dashboard
        </a>
        <a href="#" onclick="if(window.logout) window.logout()" class="btn-portal mt-4" style="background: transparent; border: 1px solid #dc3545; color: #dc3545;">
            <i class="fas fa-sign-out-alt"></i> Sign Out
        </a>
    </div>
